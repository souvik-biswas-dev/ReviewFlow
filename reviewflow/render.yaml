services:
  - type: web
    name: reviewflow-api
    runtime: go
    rootDir: .
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: reviewflow
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
